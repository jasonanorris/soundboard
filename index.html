<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soundboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Soundboard</h1>
          <p>25 quick pads with starter synth sounds.</p>
        </div>
        <div class="topbar-controls">
          <label class="board-switcher" for="boardSwitch">
            <span class="board-switcher-label">Board</span>
            <input
              type="range"
              id="boardSwitch"
              min="0"
              max="0"
              value="0"
              step="1"
              aria-label="Switch soundboard"
            >
            <span class="board-switcher-name" id="boardName">Starter</span>
          </label>
          <button class="stop-button" type="button" id="stopAll">Stop</button>
        </div>
      </header>

      <section class="board" id="soundboard" aria-label="Soundboard pads"></section>
    </main>
  </body>
</html>
