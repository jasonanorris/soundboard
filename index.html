<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soundboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Soundboard</h1>
          <p>25 quick pads with starter synth sounds.</p>
        </div>
        <button class="stop-button" type="button" id="stopAll">Stop</button>
      </header>

      <section class="board" id="soundboard" aria-label="Soundboard pads"></section>
    </main>
  </body>
</html>
