<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soundboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="audio/boards.js"></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Soundboard</h1>
          <p>25 quick pads with starter synth sounds.</p>
        </div>
        <div class="topbar-controls">
          <div class="board-switcher">
            <span class="board-switcher-label">Board</span>
            <button
              class="board-slider"
              type="button"
              id="boardSwitch"
              aria-label="Open board picker"
              aria-haspopup="dialog"
              aria-controls="boardModal"
              aria-expanded="false"
            >
              <span class="board-slider-fill"></span>
              <span class="board-slider-thumb"></span>
            </button>
            <span class="board-switcher-name" id="boardName">Starter</span>
          </div>
          <button class="stop-button" type="button" id="stopAll">Stop</button>
        </div>
      </header>

      <section class="board" id="soundboard" aria-label="Soundboard pads"></section>
    </main>

    <div class="modal-backdrop" id="boardModal" hidden>
      <section
        class="board-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="boardModalTitle"
      >
        <header class="board-modal-header">
          <h2 id="boardModalTitle">Choose Board</h2>
          <button class="modal-close" type="button" id="closeBoardModal" aria-label="Close board picker">
            Close
          </button>
        </header>
        <div class="board-list" id="boardList"></div>
      </section>
    </div>
  </body>
</html>
